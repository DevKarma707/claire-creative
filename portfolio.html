<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — Claire Creative, Paris</title>
  <meta name="description" content="Portfolio de Claire Creative : mariages, réceptions, scénographie, intérieurs, vitrines et set design.">
  <link rel="icon" href="assets/logo-yeux.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Archivo:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="has-field">

  <header class="scrolled">
    <a class="brand" href="index.html">
      <span class="eyes nav-eyes"></span>
      <span class="wordmark">CLAIRE CREATIVE</span>
    </a>
    <nav class="main">
      <a href="index.html">Accueil</a>
      <a href="portfolio.html" class="active">Portfolio</a>
      <a href="about.html">À propos</a>
      <a href="index.html#contact">Contact</a>
    </nav>
    <button class="burger" aria-label="Menu"><span></span><span></span><span></span></button>
  </header>

  <div class="filters filters--field">
    <button data-cat="all" class="active">Tout</button>
    <button data-cat="weddings">Mariages</button>
    <button data-cat="parties">Réceptions</button>
    <button data-cat="scenography">Scénographie</button>
    <button data-cat="interiors">Intérieurs</button>
    <button data-cat="window-display">Vitrines</button>
    <button data-cat="set-design">Set design</button>
  </div>

  <div id="field" aria-label="Portfolio — faire défiler pour explorer"></div>
  <div id="field-title" aria-hidden="true"></div>

  <div id="lightbox" role="dialog" aria-label="Visionneuse d'images">
    <button class="close" aria-label="Fermer">✕</button>
    <button class="prev" aria-label="Précédent">←</button>
    <img src="" alt="">
    <button class="next" aria-label="Suivant">→</button>
    <span class="count"></span>
  </div>

  <script src="js/gallery-data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/field.js"></script>
</body>
</html>
